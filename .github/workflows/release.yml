name: Release Hermes

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and release Hermes.app
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build app bundle
        run: make bundle

      - name: Zip app bundle
        run: ditto -c -k --keepParent Hermes.app Hermes.app.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Hermes.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
