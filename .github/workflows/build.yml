name: Build Hermes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and test on macOS 26
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and test
        run: |
          make build
          make test

      - name: Build app bundle
        run: make bundle

      - name: Upload Hermes.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-app
          path: Hermes.app
