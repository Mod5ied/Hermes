name: Deploy Hermes Proxy

on:
  push:
    branches: [main]
    paths: ['hermes/proxy/**']
  workflow_dispatch:

jobs:
  deploy-proxy:
    name: Deploy Hermes Pass Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hermes/proxy/package-lock.json

      - name: Install dependencies
        working-directory: hermes/proxy
        run: npm ci

      - name: Typecheck Worker
        working-directory: hermes/proxy
        run: npx tsc --noEmit

      - name: Deploy Worker
        working-directory: hermes/proxy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
